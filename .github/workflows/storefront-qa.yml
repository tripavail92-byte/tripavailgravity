name: Storefront QA

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'scripts/qa_storefront_flows.mjs'
      - 'supabase/tests/operator_storefront_quality_rpc_test.sql'
      - 'supabase/migrations/2026032800000*_operator_*.sql'
      - 'supabase/migrations/20260328000008_notifications_schema_compatibility.sql'
      - 'supabase/migrations/20260326000018_tour_review_replies.sql'
      - 'supabase/migrations/20260219000002_partner_approval_system.sql'
      - '.github/workflows/storefront-qa.yml'
      - 'package.json'

jobs:
  storefront-qa:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
      Project_ID: ${{ vars.Project_ID || secrets.Project_ID }}
      Database_password: ${{ secrets.Database_password || vars.Database_password }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run storefront smoke suite
        shell: bash
        run: |
          set -euo pipefail
          npm run qa:storefront:flows | tee storefront-smoke.log
          if grep -q 'STORE_FRONT_QA_STATUS=FAIL' storefront-smoke.log; then
            echo 'Storefront smoke suite reported failure'
            exit 1
          fi
          if ! grep -q 'STORE_FRONT_QA_STATUS=PASS' storefront-smoke.log; then
            echo 'Storefront smoke suite did not emit an explicit PASS marker'
            exit 1
          fi
          if ! grep -q 'STORE_FRONT_ATTRIBUTION_SPLIT=PASS' storefront-smoke.log; then
            echo 'Storefront smoke suite did not confirm the direct-vs-attributed booking split'
            exit 1
          fi

      - name: Run storefront RPC regression
        shell: bash
        run: |
          set -euo pipefail
          npm run db:test:operator-quality:remote | tee storefront-rpc.log
          if ! grep -q 'Completed SQL file: supabase/tests/operator_storefront_quality_rpc_test.sql' storefront-rpc.log; then
            echo 'Storefront RPC regression did not complete successfully'
            exit 1
          fi